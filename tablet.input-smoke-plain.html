<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Input Smoke Plain - FisioBot</title>
  </head>
  <body>
    <main>
      <h1>Input Smoke Plain</h1>
      <p>HTML puro, sem CSS externo e sem JavaScript.</p>
      <form>
        <p>
          <label>
            Texto
            <input name="text" type="text" autocomplete="off" />
          </label>
        </p>
        <p>
          <label>
            Senha
            <input name="password" type="password" autocomplete="off" />
          </label>
        </p>
        <p>
          <label>
            Observacao
            <textarea name="notes" rows="4"></textarea>
          </label>
        </p>
        <p>
          <label>
            Opcao
            <select name="option">
              <option>Agenda</option>
              <option>Pacientes</option>
              <option>Evolucoes</option>
            </select>
          </label>
        </p>
      </form>
    </main>
  </body>
</html>
