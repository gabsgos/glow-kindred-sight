<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
    <title>FisioBot React</title>
    <script>
      (() => {
        const params = new URLSearchParams(window.location.search);
        const currentPath = window.location.pathname && window.location.pathname !== "/" ? window.location.pathname : "";
        const requested = params.get("route") || currentPath || "/dashboard";
        const target = requested.startsWith("/") && !requested.startsWith("//") ? requested : "/dashboard";
        window.history.replaceState(null, "", target);
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.getRegistrations?.().then((registrations) => {
            registrations.forEach((registration) => registration.unregister());
          }).catch(() => {});
        }
        if ("caches" in window) {
          caches.keys().then((keys) => {
            keys.forEach((key) => caches.delete(key));
          }).catch(() => {});
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/tablet-main.tsx"></script>
  </body>
</html>
