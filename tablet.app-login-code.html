<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Confirmar login - FISIA</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #1f2430;
        --muted: #667085;
        --border: #dfe3ee;
        --primary: #6f2cf4;
        --primary-dark: #5b20d2;
        --danger: #b42318;
        --danger-bg: #fff1f0;
        --ok: #067647;
        --ok-bg: #ecfdf3;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      main {
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 18px;
      }

      .box {
        width: 100%;
        max-width: 430px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        display: grid;
        place-items: center;
        background: var(--primary);
        color: #fff;
        font-weight: 800;
      }

      .brand-title {
        margin: 0;
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
      }

      .brand-subtitle,
      .hint {
        color: var(--muted);
      }

      .brand-subtitle {
        margin-top: 2px;
        font-size: 12px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card);
        box-shadow: 0 8px 24px rgba(31, 36, 48, 0.06);
        padding: 24px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.18;
      }

      .hint {
        margin: 10px 0 24px;
        font-size: 14px;
        line-height: 1.55;
      }

      form {
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input {
        width: 100%;
        height: 46px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        padding: 10px 12px;
        font-size: 18px;
        letter-spacing: 0;
        line-height: 24px;
        outline: none;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(111, 44, 244, 0.16);
      }

      button,
      .secondary-link {
        min-height: 46px;
        border-radius: 6px;
        font: inherit;
        font-weight: 700;
      }

      button {
        width: 100%;
        border: 1px solid transparent;
        color: #fff;
        background: var(--primary);
        cursor: pointer;
      }

      button:hover,
      button:focus {
        background: var(--primary-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .secondary-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        color: var(--text);
        background: #fff;
        text-decoration: none;
      }

      .notice {
        display: block;
        border-radius: 6px;
        border: 1px solid var(--border);
        padding: 10px 12px;
        margin-bottom: 16px;
        font-size: 14px;
        line-height: 1.45;
      }

      .notice.hidden {
        display: none;
      }

      .notice.error {
        color: var(--danger);
        border-color: #fecdca;
        background: var(--danger-bg);
      }

      .notice.success {
        color: var(--ok);
        border-color: #abefc6;
        background: var(--ok-bg);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="box">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">F</div>
          <div>
            <p class="brand-title">FISIA</p>
            <div class="brand-subtitle">Gestao inteligente para fisioterapeutas</div>
          </div>
        </div>

        <section class="card" aria-label="Confirmar login">
          <h1>Confirmar login</h1>
          <p class="hint">Informe o codigo de uso unico recebido para liberar este dispositivo.</p>
          <div id="notice" class="notice success" role="status" aria-live="polite"></div>
          <form id="code-form" autocomplete="off" novalidate>
            <label>
              Codigo de verificacao
              <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" required />
            </label>
            <button id="submit" type="submit">Confirmar login</button>
            <a id="login-link" class="secondary-link" href="/app-login">Voltar ao login</a>
          </form>
        </section>
      </div>
    </main>

    <script>
      (() => {
        const form = document.getElementById("code-form");
        const codeInput = document.getElementById("code");
        const submit = document.getElementById("submit");
        const notice = document.getElementById("notice");
        const loginLink = document.getElementById("login-link");
        const params = new URLSearchParams(window.location.search);

        function safeRedirect() {
          const requested = params.get("redirect") || "/dashboard";
          if (!requested.startsWith("/") || requested.startsWith("//")) return "/dashboard";
          return requested;
        }

        const redirect = safeRedirect();
        const pendingLogin = sessionStorage.getItem("fisiobot.pendingLogin") || "";
        const pendingMessage = sessionStorage.getItem("fisiobot.pendingMessage") || "";
        loginLink.href = "/app-login?redirect=" + encodeURIComponent(redirect);
        notice.textContent = pendingLogin ? pendingMessage || "Codigo enviado." : "Solicite um novo codigo de login.";
        if (!pendingLogin) notice.className = "notice error";

        function showNotice(kind, text) {
          notice.className = "notice " + kind;
          notice.textContent = text;
        }

        async function sendJson(path, body) {
          const response = await fetch(path, {
            method: "POST",
            credentials: "include",
            headers: { Accept: "application/json", "Content-Type": "application/json" },
            body: JSON.stringify(body),
          });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) throw new Error(payload.message || "Falha de comunicacao.");
          return payload;
        }

        form.addEventListener("submit", async (event) => {
          event.preventDefault();
          const code = codeInput.value.trim();
          if (!pendingLogin) {
            showNotice("error", "Solicite um novo codigo de login.");
            return;
          }
          if (!code) {
            showNotice("error", "Informe o codigo recebido.");
            return;
          }
          submit.disabled = true;
          submit.textContent = "Confirmando...";
          try {
            const response = await sendJson("/api/web/login/code", {
              login: pendingLogin,
              verificationCode: code,
            });
            if (response.authenticated) {
              sessionStorage.removeItem("fisiobot.pendingLogin");
              sessionStorage.removeItem("fisiobot.pendingMessage");
              window.location.assign(redirect);
              return;
            }
            showNotice("error", response.message || "Codigo invalido.");
          } catch (err) {
            showNotice("error", err instanceof Error ? err.message : "Codigo invalido.");
          } finally {
            submit.disabled = false;
            submit.textContent = "Confirmar login";
          }
        });

        codeInput.focus();
      })();
    </script>
  </body>
</html>
